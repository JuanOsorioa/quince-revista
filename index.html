<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="imagenes/favicon.png">
    <link rel="stylesheet" href="styles/movil.css">
    <link rel="stylesheet" href="styles/tablet-desktop.css">
    <title>¡Mis Quince! - Maria Jose</title>
  </head>
  <body>
    <header>
      <img src="imagenes/portada.png" alt="Portada de revista" id="portada">
    </header>
    <main>
       <!-- Reproductor -->
      <div class="player">
        <audio id="audio" src="../audio/audio.mp3"></audio>

        <div class="progress-wrap" id="progressWrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="player-controls">
          <button class="nav-btn like-btn" id="likeBtn" aria-label="Like">♡</button>
          <button class="nav-btn" id="prevBtn" aria-label="Canción previa">&#9664;&#9664;</button>
          <button class="play-btn" id="playBtn" aria-label="Reproducir / Pausar">&#9654;</button>
          <button class="nav-btn" id="nextBtn" aria-label="Canción siguiente">&#9654;&#9654;</button>
          <button class="nav-btn shuffle-btn" id="shuffleBtn" aria-label="Shuffle">⤯</button>
        </div>
      </div>
          <!-- Fin Reproductor -->
      <div class="contenedor-xvtexto">
        <img src="imagenes/xvmjtexto.png" alt="texto" id="xv-texto">
      </div>
      <img src="imagenes/sello MJ.png" alt="Maria Jose vibes" id="sello">
      <!--Carrusel-->
      <div class="carrusel-container">
  <div class="carrusel-track-container">
    <ul class="carrusel-track">
      <li class="carrusel-slide current-slide">
        <img class="carrusel-image fotos" src="imagenes/imagen1a.jpeg" alt="Maria Jose Foto 1">
      </li>
      <li class="carrusel-slide">
        <img class="carrusel-image fotos" src="imagenes/imagen2a.jpeg" alt="Maria Jose Foto 2">
      </li>
    </ul>
  </div>
  <div class="carrusel-nav-buttons">
    <button class="carrusel-button btn-prev" aria-label="Anterior">&#10094;</button>
    <button class="carrusel-button btn-next" aria-label="Siguiente">&#10095;</button>
  </div>
</div>
      <!--Fin Carrusel-->
      <div class="seccion-azul">
        <img src="imagenes/pasarela.png" alt="texto">
      </div>
    <!-- Carrusel 2 -->
<div class="c2-container">
  <div class="c2-track-container">
    <ul class="c2-track">
      <li class="c2-slide c2-current-slide">
        <img class="c2-image" src="imagenes/imagen1b.jpeg" alt="Maria Jose Foto 3">
      </li>
      <li class="c2-slide">
        <img class="c2-image" src="imagenes/imagen2b.jpeg" alt="Maria Jose Foto 4">
      </li>
      <li class="c2-slide">
        <img class="c2-image" src="imagenes/imagen3b.jpeg" alt="Maria Jose Foto 5">
      </li>
    </ul>
  </div>
  <div class="c2-nav-buttons">
    <button class="c2-button c2-btn-prev" aria-label="Anterior">&#10094;</button>
    <button class="c2-button c2-btn-next" aria-label="Siguiente">&#10095;</button>
  </div>
</div>
<!-- Fin Carrusel 2 -->
 <p class="detalles">FALTAN</p>
      <!-- Contador -->
<div id="countdown-container">
  <div class="countdown-item">
    <span id="days" class="number">00</span>
    <span class="label">Días</span>
  </div>
  <div class="countdown-item">
    <span id="hours" class="number">00</span>
    <span class="label">Horas</span>
  </div>
  <div class="countdown-item">
    <span id="minutes" class="number">00</span>
    <span class="label">Minutos</span>
  </div>
  <div class="countdown-item">
    <span id="seconds" class="number">00</span>
    <span class="label">Segundos</span>
  </div>
</div>
<!--Fin del contador-->

<!--Agenda-->

<section class="agenda-container">
  <!-- Flores decorativas a los lados, fuera del vidrio -->
  <img src="imagenes/flor-abajo.png" alt="flor decorativa" class="agenda-flor agenda-flor-izq">
  <img src="imagenes/flor-arriba.png" alt="flor decorativa" class="agenda-flor agenda-flor-der">

  <!-- Contenedor con imagen vidrio como fondo -->
  <div class="agenda-inner">
    <!-- Fecha -->
    <p class="agenda-sabado">SABADO</p>
    <div class="fecha">
      <img src="imagenes/27.png" alt="27">
      <img src="imagenes/junio.png" alt="junio">
    </div>

    <!-- Separador -->
    <div class="agenda-linea"></div>

    <!-- Ubicación -->
    <div class="ubicacion-header">
      <h2 class="villa-titulo">VILLA GUADALUPE</h2>
      <p class="villa-subtitulo">Santafe de Antioquia</p>
    </div>

    <!-- Ceremonia -->
    <div class="evento-item">
      <img src="imagenes/cruz.png" alt="Cruz" class="icon-detalle">
      <img src="imagenes/ceremonia.png" alt="ceremonia" class="ceremonia">
      <p>HORA: 6:00 pm</p>
    </div>

    <!-- Recepción -->
    <div class="evento-item">
      <img src="imagenes/corona.png" alt="corona" class="icon-detalle corona">
    </div>
    <img src="imagenes/recepción.png" alt="recepción" class="recepcion">
    <p class="siete">HORA: 7:00 pm</p>
    <!-- Botón de ubicación -->
    <div class="como-llegar-seccion">
      <a href="https://maps.app.goo.gl/2enLoSBHLRfSuNz48" target="_blank" class="btn-como-llegar">
        <img src="imagenes/como llegar.png" alt="Cómo llegar">
      </a>
    </div>
  </div>
</section>

<!--Fin de la Agenda-->
<div class="seccion-azul mj">
    <img src="imagenes/mj.png" alt="mj">
</div>
<img src="imagenes/flor-abajo.png" alt="flor" id="flor-int1">
</div>
      <div class="dress-code">
        <img src="imagenes/gancho.png" alt="gancho" id="gancho">
        <img src="imagenes/flor-arriba.png" alt="flor" id="flor-int2">
        <img src="imagenes/flor-arriba.png" alt="flor" id="flor-int3">
        <img src="imagenes/user.png" alt="user" id="user">
        <p class="texto">CONFIRMAR ASISTENCIA<br>
          ANTES DEL 01 DE JUNIO
        </p>
        <a href="https://wa.link/8hjq4h" target="_blank"><img src="imagenes/confirmar.png" alt="Confirmar Asitencia" id="confirmar"></a>
      </div>
      <section class="contenedor-recuerdos">
  <img src="imagenes/recuerdos.jpeg" alt="Recuerdos" class="imagen-base">

  <div class="capa-boton">
    <a href="https://drive.google.com/drive/folders/1lvLNaF95UCqlmvaDnX_RXhNdzV0q3Jh2" target="_blank">
      <img src="imagenes/subirfotos.png" alt="Subir Fotos" class="img-boton">
    </a>
  </div>
</section>
    </main>
    <footer>
      <img src="imagenes/flor-arriba.png" alt="flor" class="flor flor-arriba">
      <img src="imagenes/te-esperamos.png" alt="¡TE ESPERAMOS!" id="te-esperamos">
      <img src="imagenes/flor-abajo.png" alt="flor" class="flor flor-abajo"">
    </footer>
    <script src="scripts/fadeInfadeOut.js"></script>
    <script src="scripts/player.js"></script>
    <script src="scripts/contador.js"></script>
    <script src="scripts/carruselA.js"></script>
    <script src="scripts/carruselB.js"></script>
  </body>
</html>
